# Default Quarto configuration for EconTools
# Place this file as _quarto.yml in the EconTools package root directory
#
# Users can override by placing their own _quarto.yml in:
#   1. The same directory as their .jl script
#   2. Any parent directory (up to 3 levels)
#   3. Or by passing quarto_config="/path/to/custom.yml"
#
# This provides sensible defaults for economic research papers and notebooks

project:
  type: default

format:
  # PDF output - optimized for academic papers
  pdf:
    documentclass: article
    geometry:
      - margin=1in
      - letterpaper
    fontsize: 11pt

    # Colors and links
    colorlinks: true
    linkcolor: blue
    urlcolor: blue
    citecolor: blue

    # Table of contents
    toc: false
    toc-depth: 3

    # Section numbering
    number-sections: true
    number-depth: 3

    # Code highlighting
    highlight-style: github

    # Figure settings
    fig-width: 7
    fig-height: 5
    fig-pos: 'htbp'

    # Don't keep intermediate .tex files by default
    keep-tex: true

    # LaTeX packages for tables and figures
    include-in-header:
      - text: |
          % Math and symbols
          \usepackage{amsmath}
          \usepackage{amssymb}

          % Tables
          \usepackage{booktabs}
          \usepackage{longtable}
          \usepackage{array}
          \usepackage{multirow}
          \usepackage{wrapfig}
          \usepackage{colortbl}
          \usepackage{pdflscape}
          \usepackage{tabu}
          \usepackage[flushleft]{threeparttable}
          \usepackage{threeparttablex}
          \usepackage[normalem]{ulem}
          \usepackage{makecell}
          \usepackage{tabularray}
          \usepackage{siunitx}
          \usepackage{dcolumn}

          % Figures and floats
          \usepackage{graphicx}
          \usepackage{float}
          \usepackage{morefloats}
          \usepackage[skip=5pt, justification=centering]{caption}
          \floatplacement{figure}{H}
          \floatplacement{table}{H}

          % PGFPlots and TikZ for graphics
          \usepackage{tikz}
          \usepackage{pgfplots}
          \pgfplotsset{compat=1.18}
          \usepgfplotslibrary{groupplots}
          \usepgfplotslibrary{fillbetween}
          \usetikzlibrary{patterns}
          \usetikzlibrary{arrows.meta}
          \usetikzlibrary{positioning}
          \usetikzlibrary{calc}

          % Table array commands
          \UseTblrLibrary{booktabs}
          \UseTblrLibrary{siunitx}
          \newcommand{\tinytableTabularrayUnderline}[1]{\underline{#1}}
          \newcommand{\tinytableTabularrayStrikeout}[1]{\sout{#1}}
          \NewTableCommand{\tinytableDefineColor}[3]{\definecolor{#1}{#2}{#3}}

  # HTML output - for interactive exploration
  html:
    theme: cosmo
    toc: true
    toc-depth: 3
    toc-location: left
    number-sections: true
    code-fold: false
    code-tools: true
    html-math-method: katex
    fig-width: 8
    fig-height: 6
    embed-resources: true
    standalone: true
    page-layout: full
    grid:
      sidebar-width: 250px
      body-width: 900px
      margin-width: 250px

  # Word output - for sharing with co-authors
  docx:
    toc: false
    number-sections: true
    highlight-style: github
    fig-width: 6.5
    fig-height: 4.5

# Code execution settings
execute:
  echo: false       # Hide code by default (show only outputs)
  warning: true     # Show warnings
  error: false      # Don't show errors (stop execution)
  cache: false      # Don't cache results (for reproducibility)
  freeze: auto      # Auto-freeze computational results

# Jupyter kernel settings
jupyter:
  kernelspec:
    name: julia
    language: julia
    display_name: Julia
